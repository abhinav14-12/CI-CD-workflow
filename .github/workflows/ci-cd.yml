name: CI/CD PIPELINE
on:
  push:
    branches: main
jobs:
  test-build-deploy:
  runs-on:ubuntu-latest

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Build Docker image
      uses: docker build -t devops-app:${{ github.sha }} .
    - name: Run tests inside the container
      uses: docker run -v --rm devops-app:${{ github.sha }} pytest test.py 
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Push image to Docker Hub
      run: |
        docker tag devops-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
        docker tag devops-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}
      
